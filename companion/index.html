<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0f">
  <title>Cowan – Dein Buch-Begleiter</title>
  <meta name="description" content="Cowan ist dein KI-Begleiter zum OpenClaw-Buch. Frag per Text, Sprache oder Foto.">
  <meta property="og:title" content="Cowan – Dein Buch-Begleiter">
  <meta property="og:description" content="KI-Assistent zum OpenClaw-Buch. Text, Sprache, Kamera.">
  <meta property="og:type" content="website">
  <link rel="canonical" href="https://openclaw-buch.de/companion/">
  <style>
    /* ── Reset & Root ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --bg-card: rgba(255,255,255,0.06);
      --bg-card-hover: rgba(255,255,255,0.10);
      --bg-input: rgba(255,255,255,0.08);
      --amber: #d97706;
      --amber-light: #f59e0b;
      --amber-glow: rgba(217,119,6,0.3);
      --green: #22c55e;
      --green-dim: rgba(34,197,94,0.3);
      --red: #ef4444;
      --text: #e4e4e7;
      --text-dim: #a1a1aa;
      --text-muted: #71717a;
      --border: rgba(255,255,255,0.08);
      --border-light: rgba(255,255,255,0.12);
      --glass: rgba(255,255,255,0.05);
      --glass-border: rgba(255,255,255,0.1);
      --radius: 16px;
      --radius-sm: 10px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
      overflow: hidden;
      touch-action: manipulation;
    }

    /* ── Fullscreen Card Layout ── */
    .companion {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
    }

    /* ── Header ── */
    .comp-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px calc(12px + env(safe-area-inset-right, 0px)) 12px calc(12px + env(safe-area-inset-left, 0px));
      border-bottom: 1px solid var(--border);
      background: var(--glass);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      flex-shrink: 0;
    }

    .comp-logo {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    .comp-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
    }

    .comp-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .comp-status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: background 0.3s;
    }

    .comp-status-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green-dim); }
    .comp-status-dot.api-ready { background: var(--amber); box-shadow: 0 0 6px var(--amber-glow); }

    /* ── TTS Toggle ── */
    .comp-tts-toggle {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border-light);
      background: var(--bg-card);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    .comp-tts-toggle:active { transform: scale(0.9); }
    .comp-tts-toggle.active {
      background: var(--amber);
      border-color: var(--amber);
      color: #fff;
    }

    .comp-tts-toggle svg { width: 16px; height: 16px; }

    .comp-chapter {
      font-size: 11px;
      color: var(--text-muted);
      padding: 2px 8px;
      background: var(--bg-input);
      border-radius: 20px;
      white-space: nowrap;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Chat / Answer Area ── */
    .comp-chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }

    .comp-welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      flex: 1;
    }

    .comp-welcome-logo {
      width: 64px;
      height: 64px;
      margin-bottom: 20px;
      opacity: 0.7;
      filter: drop-shadow(0 0 12px var(--amber-glow));
    }

    .comp-welcome h2 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .comp-welcome p {
      font-size: 14px;
      color: var(--text-dim);
      max-width: 280px;
      line-height: 1.6;
    }

    /* ── Chat Bubbles ── */
    .msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      line-height: 1.6;
      animation: fadeInUp 0.25s ease;
    }

    .msg.user {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--amber), #b45309);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.user.has-image {
      padding: 6px;
    }

    .msg.user .msg-image {
      width: 100%;
      max-width: 200px;
      border-radius: 8px;
      margin-bottom: 6px;
      display: block;
    }

    .msg.user .msg-image + .msg-text {
      padding: 4px 8px;
    }

    .msg.assistant {
      align-self: flex-start;
      background: var(--bg-card);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .msg.assistant code {
      background: rgba(0,0,0,0.3);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
    }

    .msg.assistant pre {
      background: rgba(0,0,0,0.4);
      padding: 10px 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 8px 0;
      font-size: 12px;
      line-height: 1.5;
    }

    .msg.assistant pre code {
      background: none;
      padding: 0;
    }

    .msg.assistant strong { color: var(--amber-light); }

    .msg.assistant a {
      color: var(--amber-light);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .msg.system {
      align-self: center;
      background: none;
      color: var(--text-muted);
      font-size: 12px;
      text-align: center;
      padding: 4px 0;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Dot Animation ── */
    .dots-container {
      display: flex;
      gap: 5px;
      justify-content: center;
      align-items: center;
      padding: 16px;
      align-self: flex-start;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--amber);
      opacity: 0.5;
      transition: transform 0.15s, opacity 0.15s;
    }

    .dots-container.thinking .dot {
      animation: dotWave 1.2s ease-in-out infinite;
      opacity: 1;
    }

    .dots-container.thinking .dot:nth-child(1) { animation-delay: 0s; }
    .dots-container.thinking .dot:nth-child(2) { animation-delay: 0.15s; }
    .dots-container.thinking .dot:nth-child(3) { animation-delay: 0.3s; }

    .dots-container.listening .dot {
      opacity: 1;
      animation: dotPulse 0.6s ease-in-out infinite alternate;
    }

    .dots-container.listening .dot:nth-child(1) { animation-delay: 0s; }
    .dots-container.listening .dot:nth-child(2) { animation-delay: 0.1s; }
    .dots-container.listening .dot:nth-child(3) { animation-delay: 0.2s; }

    .dots-container.speaking .dot {
      opacity: 1;
      animation: dotSpeak 0.5s ease-in-out infinite alternate;
    }

    .dots-container.speaking .dot:nth-child(1) { animation-delay: 0s; }
    .dots-container.speaking .dot:nth-child(2) { animation-delay: 0.15s; }
    .dots-container.speaking .dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes dotSpeak {
      from { transform: scaleY(1); opacity: 0.7; }
      to { transform: scaleY(1.8); opacity: 1; }
    }

    @keyframes dotWave {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-10px); }
    }

    @keyframes dotPulse {
      from { transform: scale(1); opacity: 0.6; }
      to { transform: scale(1.5); opacity: 1; }
    }

    /* ── Input Bar ── */
    .comp-input-bar {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      padding: 8px calc(8px + env(safe-area-inset-right, 0px)) 10px calc(8px + env(safe-area-inset-left, 0px));
      border-top: 1px solid var(--border);
      background: var(--glass);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      flex-shrink: 0;
      max-width: 100vw;
      overflow: hidden;
    }

    .comp-btn {
      width: 38px;
      height: 38px;
      min-width: 38px;
      border-radius: 50%;
      border: 1px solid var(--border-light);
      background: var(--bg-card);
      color: var(--text-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .comp-btn:active { transform: scale(0.92); }
    .comp-btn:hover { background: var(--bg-card-hover); color: var(--text); }

    .comp-btn.recording {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
      animation: recPulse 1.5s ease infinite;
    }

    @keyframes recPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
      50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
    }

    .comp-btn svg { width: 18px; height: 18px; }

    .comp-input-wrap {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: flex-end;
      background: var(--bg-input);
      border: 1px solid var(--border-light);
      border-radius: 22px;
      padding: 3px 3px 3px 12px;
      transition: border-color 0.2s;
      min-height: 38px;
    }

    .comp-input-wrap:focus-within { border-color: var(--amber); }

    .comp-input-wrap textarea {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      line-height: 1.4;
      resize: none;
      outline: none;
      max-height: 120px;
      padding: 7px 0;
      overflow-y: auto;
    }

    .comp-input-wrap textarea::placeholder { color: var(--text-muted); }

    .comp-send {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      background: var(--amber);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
      opacity: 0.4;
      pointer-events: none;
    }

    .comp-send.active {
      opacity: 1;
      pointer-events: auto;
    }

    .comp-send:active { transform: scale(0.9); }
    .comp-send svg { width: 18px; height: 18px; }

    /* ── Image Preview ── */
    .comp-image-preview {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
    }

    .comp-image-preview.visible { display: flex; }

    .comp-image-preview img {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      object-fit: cover;
    }

    .comp-image-preview span {
      flex: 1;
      font-size: 13px;
      color: var(--text-dim);
    }

    .comp-image-preview .remove-img {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: rgba(239,68,68,0.2);
      color: var(--red);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Setup Screen (kein API-Key) ── */
    .comp-setup {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
      flex: 1;
      gap: 16px;
    }

    .comp-setup h2 {
      font-size: 18px;
      font-weight: 600;
    }

    .comp-setup p {
      font-size: 14px;
      color: var(--text-dim);
      max-width: 300px;
      line-height: 1.6;
    }

    .comp-setup input {
      width: 100%;
      max-width: 320px;
      padding: 12px 16px;
      background: var(--bg-input);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 14px;
      font-family: 'SF Mono', monospace;
      outline: none;
    }

    .comp-setup input:focus { border-color: var(--amber); }

    .comp-setup button {
      padding: 12px 32px;
      background: linear-gradient(135deg, var(--amber), #b45309);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .comp-setup button:active { transform: scale(0.96); }

    /* ── Hidden File Input ── */
    #cameraInput { display: none; }

    /* ── Scrollbar ── */
    .comp-chat::-webkit-scrollbar { width: 4px; }
    .comp-chat::-webkit-scrollbar-track { background: transparent; }
    .comp-chat::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 4px; }

    /* ── Utility ── */
    .hidden { display: none !important; }

    /* ══════════════════════════════════════════
       VOICE OVERLAY (Comet-Stil)
       ══════════════════════════════════════════ */
    .voice-overlay {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      background: linear-gradient(165deg, rgba(20,80,80,0.92) 0%, rgba(30,60,50,0.95) 50%, rgba(50,40,20,0.92) 100%);
      backdrop-filter: blur(40px) saturate(200%);
      -webkit-backdrop-filter: blur(40px) saturate(200%);
      border-top-left-radius: 20px;
      border-top-right-radius: 20px;
      box-shadow: 0 -4px 40px rgba(0,0,0,0.5);
      transition: height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      padding-bottom: var(--safe-bottom);
      overflow: hidden;
    }

    .voice-overlay.vo-hidden { display: none; }

    /* Minimiert: nur Bottom-Bar (~70px) */
    .voice-overlay.vo-minimized { height: 70px; }

    /* Expanded: 60% vom Screen */
    .voice-overlay.vo-expanded { height: 60vh; height: 60dvh; }

    /* Fullscreen (hochgezogen) */
    .voice-overlay.vo-full { height: 85vh; height: 85dvh; }

    /* Drag Handle */
    .vo-handle {
      width: 36px;
      height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
      cursor: grab;
    }

    /* Karaoke Text Area */
    .vo-text {
      flex: 1;
      padding: 20px 24px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      font-size: 18px;
      line-height: 1.7;
      font-weight: 400;
    }

    .vo-text .vo-word {
      color: rgba(255,255,255,0.4);
      transition: color 0.15s;
    }

    .vo-text .vo-word.spoken {
      color: rgba(255,255,255,0.5);
    }

    .vo-text .vo-word.current {
      color: #fff;
      font-weight: 500;
    }

    .vo-text .vo-word.upcoming {
      color: rgba(255,255,255,0.0);
    }

    /* Bottom Bar */
    .vo-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      flex-shrink: 0;
    }

    .vo-bar-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.2s;
    }

    .vo-bar-btn:active { transform: scale(0.9); }
    .vo-bar-btn svg { width: 20px; height: 20px; }

    /* Dots in der Bar (Comet-Stil: Grid aus kleinen Punkten) */
    .vo-dots {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: center;
      align-items: center;
      width: 160px;
    }

    .vo-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(100,210,200,0.5);
      transition: all 0.15s;
    }

    .voice-overlay.vo-speaking .vo-dot {
      animation: voDotPulse 1.5s ease-in-out infinite;
    }

    .vo-dot:nth-child(3n) { animation-delay: 0.1s; }
    .vo-dot:nth-child(3n+1) { animation-delay: 0.25s; }
    .vo-dot:nth-child(3n+2) { animation-delay: 0.4s; }

    .voice-overlay.vo-thinking .vo-dot {
      animation: voDotWave 1.2s ease-in-out infinite;
    }

    @keyframes voDotPulse {
      0%, 100% { opacity: 0.4; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); background: rgba(100,220,210,0.9); }
    }

    @keyframes voDotWave {
      0%, 100% { opacity: 0.3; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(-3px); }
    }
  </style>
</head>
<body>

<div class="companion" id="app">
  <!-- Header -->
  <div class="comp-header">

    <span class="comp-title">Cowan</span>
    <span class="comp-chapter hidden" id="chapterBadge"></span>
    <button class="comp-tts-toggle" id="ttsToggle" onclick="toggleTts()" title="Antworten vorlesen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
    </button>
    <div class="comp-status">
      <div class="comp-status-dot" id="statusDot"></div>
      <span id="statusText">Offline</span>
    </div>
  </div>

  <div class="comp-setup" id="setupScreen">

<script>
(function() {
  'use strict';

  /* ══════════════════════════════════════════
     STATE
     ══════════════════════════════════════════ */
  var apiKey = '';
  var messages = [];       // {role, content, image?}
  var chunks = [];
  var isLoading = false;
  var isRecording = false;
  var pendingImage = null; // {base64, mimeType}
  var recognition = null;
  var selectedModel = 'claude-haiku-4-5-20251001';

  // TTS
  var ttsEnabled = false;
  var ttsUrl = '';       // wird aus syncUrl abgeleitet: hostname:8443
  var audioCtx = null;   // AudioContext (iOS Safari kompatibel)
  var isSpeaking = false;
  var currentSource = null; // AudioBufferSourceNode
  var ttsQueue = [];     // Satz-Queue fuer satzweises Vorlesen
  var ttsPlaying = false; // Laeuft gerade ein TTS-Satz?

  // Voice Overlay (Comet-Stil)
  var voiceOverlay, voiceText, voiceDots, voHandle;
  var voActive = false;        // Overlay gerade aktiv?
  var voWords = [];            // Array aller Woerter als Spans
  var voCurrentWordIdx = 0;    // Aktuelles Wort im Karaoke
  var voKaraokeTimer = null;   // Timer fuer Wort-Highlight
  var voDragStartY = 0;
  var voDragStartH = 0;

  // Sync
  var syncUrl = '';
  var syncToken = '';
  var syncTimer = null;
  var heartbeatTimer = null;
  var currentChapter = '';

  // DOM refs
  var setupScreen, chatArea, inputBar, msgInput, sendBtn, micBtn, cameraBtn, ttsToggle;
  var statusDot, statusText, chapterBadge, welcomeMsg, imagePreview, previewImg;

  /* ══════════════════════════════════════════
     INIT
     ══════════════════════════════════════════ */
  function init() {
    setupScreen = document.getElementById('setupScreen');
    chatArea = document.getElementById('chatArea');
    inputBar = document.getElementById('inputBar');
    msgInput = document.getElementById('msgInput');
    sendBtn = document.getElementById('sendBtn');
    micBtn = document.getElementById('micBtn');
    cameraBtn = document.getElementById('cameraBtn');
    ttsToggle = document.getElementById('ttsToggle');
    statusDot = document.getElementById('statusDot');
    statusText = document.getElementById('statusText');
    chapterBadge = document.getElementById('chapterBadge');
    welcomeMsg = document.getElementById('welcomeMsg');
    imagePreview = document.getElementById('imagePreview');
    previewImg = document.getElementById('previewImg');

    // Voice Overlay
    voiceOverlay = document.getElementById('voiceOverlay');
    voiceText = document.getElementById('voiceText');
    voiceDots = document.getElementById('voiceDots');
    voHandle = document.getElementById('voHandle');

    // Dots generieren (5x6 Grid wie Comet)
    for (var d = 0; d < 30; d++) {
      var dot = document.createElement('div');
      dot.className = 'vo-dot';
      voiceDots.appendChild(dot);
    }

    // Swipe-Geste auf Handle
    initVoSwipe();

    // URL-Parameter auslesen (QR-Code Flow)
    var params = new URLSearchParams(window.location.search);
    if (params.get('apikey')) {
      try { apiKey = atob(params.get('apikey')); } catch(e) { apiKey = params.get('apikey'); }
    }
    if (params.get('sync')) syncUrl = params.get('sync').replace(/\/$/, '');
    if (params.get('synctoken')) syncToken = params.get('synctoken');

    // Fallback: localStorage
    if (!apiKey) apiKey = localStorage.getItem('companion-apikey') || '';
    if (!syncUrl) {
      var ip = localStorage.getItem('aa-settings.tailscaleIp') || '';
      if (ip) {
        var clean = ip.replace(/^https?:\/\//, '').replace(/\/+$/, '');
        syncUrl = (clean.indexOf('.ts.net') !== -1)
          ? 'https://' + clean
          : 'http://' + clean + ':3456';
      }
    }
    if (!syncToken) syncToken = localStorage.getItem('aa-settings.syncToken') || '';

    // TTS-URL aus Sync-URL ableiten (gleicher Hostname, Port 8443)
    if (syncUrl) {
      try {
        var syncHostname = new URL(syncUrl).hostname;
        ttsUrl = 'https://' + syncHostname + ':8443';
      } catch(e) { ttsUrl = ''; }
    }

    // TTS-Praeferenz wiederherstellen
    ttsEnabled = localStorage.getItem('companion-tts') === 'true';
    if (ttsEnabled && ttsToggle) ttsToggle.classList.add('active');

    // Event Listeners
    msgInput.addEventListener('input', onInputChange);
    msgInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    document.getElementById('cameraInput').addEventListener('change', onCameraCapture);

    // Auto-resize textarea
    msgInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    // Chunks laden
    loadChunks();

    // UI State
    if (apiKey) {
      showChat();
    } else {
      showSetup();
    }
  }

  /* ══════════════════════════════════════════
     UI STATES
     ══════════════════════════════════════════ */
  function showSetup() {
    setupScreen.classList.remove('hidden');
    chatArea.classList.add('hidden');
    inputBar.classList.add('hidden');
    imagePreview.classList.remove('visible');
    updateStatus('offline', 'Kein API-Key');
  }

  function showChat() {
    setupScreen.classList.add('hidden');
    chatArea.classList.remove('hidden');
    inputBar.classList.remove('hidden');
    localStorage.setItem('companion-apikey', apiKey);
    updateStatus('api-ready', 'Bereit');

    // Sync starten wenn URL vorhanden
    if (syncUrl && syncToken) {
      startSync();
    }
  }

  function updateStatus(state, text) {
    statusDot.className = 'comp-status-dot';
    if (state === 'connected') statusDot.classList.add('connected');
    else if (state === 'api-ready') statusDot.classList.add('api-ready');
    statusText.textContent = text;
  }

  function updateChapterBadge(chapter) {
    if (chapter) {
      chapterBadge.textContent = chapter;
      chapterBadge.classList.remove('hidden');
    } else {
      chapterBadge.classList.add('hidden');
    }
  }

  /* ══════════════════════════════════════════
     SETUP
     ══════════════════════════════════════════ */
  window.saveSetupKey = function() {
    var input = document.getElementById('setupKeyInput');
    var key = (input.value || '').trim();
    if (!key) return;
    apiKey = key;
    showChat();
  };

  /* ══════════════════════════════════════════
     SEND MESSAGE
     ══════════════════════════════════════════ */
  window.sendMessage = function() {
    var text = (msgInput.value || '').trim();
    if (!text && !pendingImage) return;
    if (isLoading) return;

    // Welcome ausblenden
    if (welcomeMsg) { welcomeMsg.remove(); welcomeMsg = null; }

    // User-Bubble
    var userMsg = { role: 'user', text: text, image: pendingImage };
    messages.push(userMsg);
    renderUserBubble(userMsg);

    // Input leeren
    msgInput.value = '';
    msgInput.style.height = 'auto';
    onInputChange();
    removeImage();

    var useTts = ttsEnabled && ttsUrl && syncToken;

    if (useTts) {
      // ═══ VOICE OVERLAY MODUS (Comet-Stil) ═══
      showVoiceOverlay('thinking');
      isLoading = true;
      var streamBuffer = '';
      var streamStarted = false;
      var sentenceScanned = 0;
      var sentenceQueue = [];
      var processingQueue = false;
      var streamDone = false;

      callClaudeStream(text, userMsg.image, function onChunk(delta) {
        if (!streamStarted) {
          streamStarted = true;
          showVoiceOverlay('speaking');
        }
        streamBuffer += delta;
        // Karaoke-Text aktualisieren (alle Woerter neu setzen)
        voSetText(streamBuffer);
        voDetectSentences();
      }).then(function() {
        streamDone = true;
        isLoading = false;
        if (!streamStarted) {
          closeVoiceOverlay();
          renderSystemMsg('Leere Antwort von Claude');
          return;
        }
        // Letzten Rest flushen
        var rest = streamBuffer.slice(sentenceScanned).trim();
        if (rest.length > 0) {
          sentenceQueue.push(rest);
        }
        if (!processingQueue) voProcessNext();
      }).catch(function(err) {
        streamDone = true;
        isLoading = false;
        closeVoiceOverlay();
        if (streamBuffer) {
          messages.push({ role: 'assistant', text: streamBuffer });
          renderAssistantBubble(streamBuffer);
        }
        renderSystemMsg('Fehler: ' + (err.message || 'Unbekannter Fehler'));
        scrollToBottom();
      });

      function voDetectSentences() {
        while (true) {
          var remaining = streamBuffer.slice(sentenceScanned);
          var match = remaining.match(/[.!?:]\s|\n\n/);
          if (!match) break;
          var endIdx = sentenceScanned + match.index + match[0].length;
          var sentenceText = streamBuffer.slice(sentenceScanned, endIdx).trim();
          if (sentenceText.length > 0) {
            sentenceQueue.push(sentenceText);
          }
          sentenceScanned = endIdx;
        }
        if (!processingQueue && sentenceQueue.length > 0) voProcessNext();
      }

      function voProcessNext() {
        if (sentenceQueue.length === 0) {
          processingQueue = false;
          if (streamDone) {
            // Alles vorgelesen → in Chat uebertragen
            messages.push({ role: 'assistant', text: streamBuffer });
            voTransferToChat(streamBuffer);
          }
          return;
        }
        processingQueue = true;
        var sentence = sentenceQueue.shift();
        var cleanSentence = cleanTextForTts(sentence);

        if (cleanSentence.length < 3) {
          voProcessNext();
          return;
        }

        // Woerter in diesem Satz zaehlen (fuer Karaoke-Speed)
        var sentenceWords = cleanSentence.split(/\s+/).length;

        fetchTtsAudio(cleanSentence).then(function(audioBuffer) {
          var durationMs = audioBuffer.duration * 1000;

          // Audio starten
          playAudioBuffer(audioBuffer, function onAudioEnd() {
            // Audio fertig → naechsten Satz
            voProcessNext();
          });

          // Karaoke: Woerter synchron mit Audio aufdecken
          voStartKaraoke(voCurrentWordIdx, sentenceWords, durationMs * 0.95, null);
        }).catch(function() {
          // TTS-Fehler → Woerter schnell aufdecken, weiter
          voStartKaraoke(voCurrentWordIdx, sentenceWords, 500, function() {
            voProcessNext();
          });
        });
      }

    } else {
      // ═══ CHAT MODUS (kein TTS, Typewriter) ═══
      var dotsEl = showDots('thinking');
      isLoading = true;
      var streamBubble = null;
      var streamBuffer = '';
      var revealedCount = 0;
      var streamDone = false;
      var activeTypewriter = null;
      var NO_TTS_DELAY = 25;

      callClaudeStream(text, userMsg.image, function onChunk(delta) {
        if (!streamBubble) {
          removeDots(dotsEl);
          streamBubble = createStreamBubble();
          startTypewriter();
        }
        streamBuffer += delta;
      }).then(function() {
        streamDone = true;
        isLoading = false;
        if (!streamBubble) {
          removeDots(dotsEl);
          renderSystemMsg('Leere Antwort von Claude');
        }
      }).catch(function(err) {
        streamDone = true;
        isLoading = false;
        if (activeTypewriter) { clearInterval(activeTypewriter); activeTypewriter = null; }
        if (streamBubble && streamBuffer) {
          updateStreamBubble(streamBubble, streamBuffer);
          messages.push({ role: 'assistant', text: streamBuffer });
        }
        removeDots(dotsEl);
        renderSystemMsg('Fehler: ' + (err.message || 'Unbekannter Fehler'));
        scrollToBottom();
      });

      function startTypewriter() {
        activeTypewriter = setInterval(function() {
          if (revealedCount < streamBuffer.length) {
            revealedCount++;
            updateStreamBubble(streamBubble, streamBuffer.slice(0, revealedCount));
            scrollToBottom();
          } else if (streamDone) {
            clearInterval(activeTypewriter);
            activeTypewriter = null;
            messages.push({ role: 'assistant', text: streamBuffer });
            scrollToBottom();
          }
        }, NO_TTS_DELAY);
      }
    }
  };

  /* ══════════════════════════════════════════
     CLAUDE API (Streaming, SSE)
     ══════════════════════════════════════════ */
  function callClaudeStream(text, image, onChunk) {
    // System-Prompt mit Chunks
    var systemPrompt = buildSystemPrompt();

    // Messages bauen
    var apiMessages = [];
    // Konversations-History (letzte 10 Nachrichten)
    var historyStart = Math.max(0, messages.length - 11);
    for (var i = historyStart; i < messages.length; i++) {
      var m = messages[i];
      if (m.role === 'user') {
        var content = [];
        if (m.image) {
          content.push({
            type: 'image',
            source: { type: 'base64', media_type: m.image.mimeType, data: m.image.base64 }
          });
        }
        if (m.text) content.push({ type: 'text', text: m.text });
        apiMessages.push({ role: 'user', content: content });
      } else if (m.role === 'assistant') {
        apiMessages.push({ role: 'assistant', content: m.text });
      }
    }

    // TTS-Queue zuruecksetzen
    ttsQueue = [];
    ttsPlaying = false;

    return fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: selectedModel,
        max_tokens: 1024,
        stream: true,
        system: systemPrompt,
        messages: apiMessages
      })
    }).then(function(res) {
      if (!res.ok) {
        return res.text().then(function(body) {
          if (res.status === 401) {
            apiKey = '';
            localStorage.removeItem('companion-apikey');
            showSetup();
            throw new Error('API-Key ungueltig. Bitte neu eingeben.');
          }
          var errMsg = 'API-Fehler ' + res.status;
          try { var parsed = JSON.parse(body); errMsg = parsed.error ? parsed.error.message : errMsg; } catch(e) {}
          throw new Error(errMsg);
        });
      }

      // SSE-Stream lesen
      var reader = res.body.getReader();
      var decoder = new TextDecoder();
      var sseBuffer = '';

      function processStream() {
        return reader.read().then(function(result) {
          if (result.done) return;

          sseBuffer += decoder.decode(result.value, { stream: true });

          // SSE-Events zeilenweise parsen
          var lines = sseBuffer.split('\n');
          sseBuffer = lines.pop(); // Letztes (unvollstaendiges) Fragment behalten

          for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (!line.startsWith('data: ')) continue;
            var jsonStr = line.slice(6);
            if (jsonStr === '[DONE]') return;

            try {
              var evt = JSON.parse(jsonStr);

              // Text-Delta extrahieren
              if (evt.type === 'content_block_delta' && evt.delta && evt.delta.type === 'text_delta') {
                onChunk(evt.delta.text);
              }

              // Fehler im Stream
              if (evt.type === 'error') {
                throw new Error(evt.error ? evt.error.message : 'Stream-Fehler');
              }
            } catch (parseErr) {
              if (parseErr.message && parseErr.message !== 'Stream-Fehler' && parseErr.message.indexOf('JSON') !== -1) {
                // JSON Parse-Fehler ignorieren (unvollstaendige Chunks)
              } else if (parseErr.message) {
                throw parseErr;
              }
            }
          }

          return processStream();
        });
      }

      return processStream();
    });
  }

  function buildSystemPrompt() {
    var parts = [
      'Du bist Cowan, der freundliche KI-Begleiter zum OpenClaw-Buch.',
      'Du hilfst dem Leser bei Fragen rund ums Buch: Installation, Docker, Agent-Konfiguration, Troubleshooting, und allem was im Buch behandelt wird.',
      'Antworte kurz und praezise (max 3-4 Absaetze). Verwende Du-Form.',
      'Verwende NIEMALS Emojis – deine Antworten werden vorgelesen.',
      'Wenn der Leser ein Foto einer Buchseite schickt, erkenne das Kapitel und die Stelle und hilf gezielt weiter.',
      'Wenn du eine Frage nicht beantworten kannst, sag das ehrlich.'
    ];

    // Kapitel-Kontext
    if (currentChapter) {
      parts.push('Der Leser ist gerade bei: ' + currentChapter + '. Beziehe dich darauf wenn es passt.');
    }

    // Relevante Chunks einbinden
    var relevantChunks = getRelevantChunks();
    if (relevantChunks.length > 0) {
      parts.push('\n--- Wissensbasis ---');
      for (var i = 0; i < relevantChunks.length; i++) {
        parts.push('\n### ' + relevantChunks[i].title + '\n' + relevantChunks[i].content);
      }
    }

    return parts.join('\n');
  }

  /* ══════════════════════════════════════════
     CHUNKS
     ══════════════════════════════════════════ */
  function loadChunks() {
    // Relative path: companion/ -> shared/chunks.json
    fetch('../shared/chunks.json').then(function(res) {
      if (!res.ok) throw new Error('Chunks nicht gefunden');
      return res.json();
    }).then(function(data) {
      chunks = data;
    }).catch(function() {
      // Fallback: try absolute
      fetch('/shared/chunks.json').then(function(res) {
        return res.ok ? res.json() : [];
      }).then(function(data) {
        chunks = data || [];
      }).catch(function() { chunks = []; });
    });
  }

  function getRelevantChunks() {
    if (!chunks.length) return [];

    // Wenn Kapitel bekannt: nach Tags filtern
    if (currentChapter) {
      var chapterNum = currentChapter.replace(/\D/g, '');
      var relevant = [];
      for (var i = 0; i < chunks.length; i++) {
        var c = chunks[i];
        // Basis-Chunks immer dabei
        if (c.category === 'setup' || c.category === 'overview' || c.difficulty === 'beginner') {
          relevant.push(c);
        }
        // Kapitel-Tag matching (wenn vorhanden)
        if (c.kapitel && c.kapitel.indexOf(parseInt(chapterNum)) !== -1) {
          relevant.push(c);
        }
      }
      // Deduplizieren und limitieren
      var seen = {};
      var unique = [];
      for (var j = 0; j < relevant.length; j++) {
        if (!seen[relevant[j].id]) {
          seen[relevant[j].id] = true;
          unique.push(relevant[j]);
        }
      }
      return unique.slice(0, 8);
    }

    // Ohne Kapitel: Basis-Chunks (die wichtigsten 5)
    return chunks.slice(0, 5);
  }

  /* ══════════════════════════════════════════
     SYNC (Heartbeat + Dashboard-State)
     ══════════════════════════════════════════ */
  function startSync() {
    sendHeartbeat();
    heartbeatTimer = setInterval(sendHeartbeat, 15000);
    readDashboardState();
    syncTimer = setInterval(readDashboardState, 10000);
    updateStatus('connected', 'Verbunden');
  }

  function sendHeartbeat() {
    if (!syncUrl || !syncToken) return;
    var payload = {
      type: 'companion-heartbeat',
      device: 'companion',
      lastUpdate: new Date().toISOString(),
      event: { type: 'companion-heartbeat' }
    };
    fetch(syncUrl + '/cowan-events.json', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + syncToken
      },
      body: JSON.stringify(payload)
    }).catch(function() {
      // Sync-Fehler leise ignorieren
    });
  }

  function readDashboardState() {
    if (!syncUrl || !syncToken) return;
    fetch(syncUrl + '/dashboard-state.json', {
      headers: { 'Authorization': 'Bearer ' + syncToken }
    }).then(function(res) {
      return res.ok ? res.json() : null;
    }).then(function(data) {
      if (data && data.module) {
        var LABELS = {
          'fahrplan': 'Dein Fahrplan', 'setup-guide': 'Setup-Guide',
          'meine-daten': 'Meine Daten', 'buch-dashboard': 'Buch-Dashboard',
          'publishing': 'Publishing', 'workspace-wizard': 'Workspace Wizard',
          'config-builder': 'Config Builder', 'cost-calculator': 'Kostenrechner',
          'soul-gallery': 'SOUL Gallery', 'cli-referenz': 'CLI-Referenz',
          'system-status': 'System-Status'
        };
        var label = LABELS[data.module] || data.module;
        currentChapter = label;
        updateChapterBadge(label);
      }
    }).catch(function() {});
  }

  /* ══════════════════════════════════════════
     STREAM BUBBLE (fuer Nicht-TTS-Modus)
     ══════════════════════════════════════════ */
  function createStreamBubble() {
    var el = document.createElement('div');
    el.className = 'msg assistant';
    el.innerHTML = '<p></p>';
    chatArea.appendChild(el);
    return el;
  }

  function updateStreamBubble(el, fullText) {
    el.innerHTML = renderMarkdown(fullText);
  }

  /* ══════════════════════════════════════════
     VOICE OVERLAY (Comet-Stil)
     ══════════════════════════════════════════ */
  function showVoiceOverlay(state) {
    voActive = true;
    voiceOverlay.className = 'voice-overlay';
    if (state === 'minimized') {
      voiceOverlay.classList.add('vo-minimized');
    } else if (state === 'thinking') {
      voiceOverlay.classList.add('vo-expanded', 'vo-thinking');
    } else if (state === 'speaking') {
      voiceOverlay.classList.add('vo-expanded', 'vo-speaking');
    }
  }

  window.closeVoiceOverlay = function() {
    stopSpeaking();
    if (voKaraokeTimer) { clearInterval(voKaraokeTimer); voKaraokeTimer = null; }
    voiceOverlay.className = 'voice-overlay vo-hidden';
    voiceText.innerHTML = '';
    voWords = [];
    voCurrentWordIdx = 0;
    voActive = false;
  };

  // Karaoke: Text als Wort-Spans rendern (alles hidden/upcoming)
  function voSetText(fullText) {
    voiceText.innerHTML = '';
    voWords = [];
    voCurrentWordIdx = 0;

    // Markdown bereinigen fuer Overlay-Anzeige
    var clean = fullText
      .replace(/```[\s\S]*?```/g, '')
      .replace(/`([^`]+)`/g, '$1')
      .replace(/\*\*([^*]+)\*\*/g, '$1')
      .replace(/\*([^*]+)\*/g, '$1')
      .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
      .replace(/#{1,6}\s/g, '');

    var words = clean.split(/(\s+)/); // Woerter + Whitespace behalten
    for (var i = 0; i < words.length; i++) {
      var span = document.createElement('span');
      if (/^\s+$/.test(words[i])) {
        // Whitespace: newlines als <br>, spaces als Text
        span.innerHTML = words[i].replace(/\n/g, '<br>');
      } else {
        span.textContent = words[i];
        span.className = 'vo-word upcoming';
      }
      voiceText.appendChild(span);
      voWords.push(span);
    }
  }

  // Karaoke: Alle Woerter bis idx aufdecken, idx als current
  function voRevealUpTo(wordIdx) {
    for (var i = 0; i < voWords.length; i++) {
      var w = voWords[i];
      if (!w.classList || !w.classList.contains('vo-word')) continue; // Whitespace ueberspringen
      if (i < wordIdx) {
        w.className = 'vo-word spoken';
      } else if (i === wordIdx) {
        w.className = 'vo-word current';
      } else {
        w.className = 'vo-word upcoming';
      }
    }
    // Auto-Scroll zum aktuellen Wort
    if (voWords[wordIdx] && voWords[wordIdx].scrollIntoView) {
      voWords[wordIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  // Karaoke starten: wordCount Woerter in durationMs aufdecken
  function voStartKaraoke(startWordIdx, wordCount, durationMs, onDone) {
    if (voKaraokeTimer) clearInterval(voKaraokeTimer);
    var wordsToReveal = [];
    // Nur echte Woerter zaehlen (keine Whitespace-Spans)
    var count = 0;
    for (var i = startWordIdx; i < voWords.length && count < wordCount; i++) {
      if (voWords[i].classList && voWords[i].classList.contains('vo-word')) {
        wordsToReveal.push(i);
        count++;
      }
    }
    if (wordsToReveal.length === 0) { if (onDone) onDone(); return; }

    var delay = durationMs / wordsToReveal.length;
    var step = 0;

    voKaraokeTimer = setInterval(function() {
      if (step < wordsToReveal.length) {
        voRevealUpTo(wordsToReveal[step]);
        voCurrentWordIdx = wordsToReveal[step] + 1;
        step++;
      } else {
        clearInterval(voKaraokeTimer);
        voKaraokeTimer = null;
        if (onDone) onDone();
      }
    }, delay);
  }

  // Voice-Overlay -> Chat Transfer
  function voTransferToChat(fullText) {
    // Alle Woerter als "spoken" zeigen
    for (var i = 0; i < voWords.length; i++) {
      if (voWords[i].classList && voWords[i].classList.contains('vo-word')) {
        voWords[i].className = 'vo-word spoken';
      }
    }
    // Kurz warten, dann ins Chat uebertragen + Overlay schliessen
    setTimeout(function() {
      renderAssistantBubble(fullText);
      scrollToBottom();
      voiceOverlay.className = 'voice-overlay vo-hidden';
      voiceText.innerHTML = '';
      voWords = [];
      voCurrentWordIdx = 0;
      voActive = false;
    }, 600);
  }

  // Swipe-Geste fuer Overlay
  function initVoSwipe() {
    var isDragging = false;

    function onStart(e) {
      if (!voActive) return;
      isDragging = true;
      voDragStartY = e.touches ? e.touches[0].clientY : e.clientY;
      voDragStartH = voiceOverlay.offsetHeight;
      voiceOverlay.style.transition = 'none';
    }

    function onMove(e) {
      if (!isDragging) return;
      var y = e.touches ? e.touches[0].clientY : e.clientY;
      var diff = voDragStartY - y; // positiv = hochziehen
      var newH = Math.max(70, Math.min(window.innerHeight * 0.9, voDragStartH + diff));
      voiceOverlay.style.height = newH + 'px';
    }

    function onEnd() {
      if (!isDragging) return;
      isDragging = false;
      voiceOverlay.style.transition = '';
      var h = voiceOverlay.offsetHeight;
      var vh = window.innerHeight;
      // Snap-Logik
      if (h < vh * 0.2) {
        voiceOverlay.className = voiceOverlay.className.replace(/vo-(expanded|full|minimized)/g, '').trim() + ' vo-minimized';
      } else if (h > vh * 0.7) {
        voiceOverlay.className = voiceOverlay.className.replace(/vo-(expanded|full|minimized)/g, '').trim() + ' vo-full';
      } else {
        voiceOverlay.className = voiceOverlay.className.replace(/vo-(expanded|full|minimized)/g, '').trim() + ' vo-expanded';
      }
      voiceOverlay.style.height = '';
    }

    voHandle.addEventListener('touchstart', onStart, { passive: true });
    document.addEventListener('touchmove', onMove, { passive: true });
    document.addEventListener('touchend', onEnd);
    voHandle.addEventListener('mousedown', onStart);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
  }

  /* ══════════════════════════════════════════
     TTS (Text-to-Speech ueber VPS)
     Synchron-Modus: Audio fuehrt, Text folgt.
     fetchTtsAudio() holt Audio, playAudioBuffer()
     spielt ab. Typewriter-Geschwindigkeit wird an
     Audio-Dauer angepasst → Text + Sprache synchron.
     AudioContext fuer iOS Safari Kompatibilitaet.
     ══════════════════════════════════════════ */
  var ttsSpeakDots = null;

  function getAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtx;
  }

  window.toggleTts = function() {
    ttsEnabled = !ttsEnabled;
    localStorage.setItem('companion-tts', ttsEnabled ? 'true' : 'false');
    ttsToggle.classList.toggle('active', ttsEnabled);

    if (ttsEnabled) {
      var ctx = getAudioCtx();
      if (ctx.state === 'suspended') ctx.resume();
    } else {
      stopSpeaking();
    }
  };

  function cleanTextForTts(text) {
    return text
      .replace(/```[\s\S]*?```/g, ' Code-Block ausgelassen. ')
      .replace(/`([^`]+)`/g, '$1')
      .replace(/\*\*([^*]+)\*\*/g, '$1')
      .replace(/\*([^*]+)\*/g, '$1')
      .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
      .replace(/#{1,6}\s/g, '')
      .trim();
  }

  // Audio vom TTS-Server holen (gibt AudioBuffer zurueck)
  function fetchTtsAudio(text) {
    if (text.length > 5000) text = text.slice(0, 4990) + '...';
    var ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();

    return fetch(ttsUrl + '/speak', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + syncToken
      },
      body: JSON.stringify({ text: text })
    }).then(function(res) {
      if (!res.ok) throw new Error('TTS-Fehler ' + res.status);
      return res.arrayBuffer();
    }).then(function(arrayBuffer) {
      return ctx.decodeAudioData(arrayBuffer);
    });
  }

  // AudioBuffer abspielen, onEnded-Callback
  function playAudioBuffer(audioBuffer, onEnded) {
    var ctx = getAudioCtx();
    if (currentSource) { try { currentSource.stop(); } catch(e) {} }

    isSpeaking = true;
    currentSource = ctx.createBufferSource();
    currentSource.buffer = audioBuffer;
    currentSource.connect(ctx.destination);
    currentSource.onended = function() {
      currentSource = null;
      isSpeaking = false;
      if (onEnded) onEnded();
    };
    currentSource.start(0);
  }

  function stopSpeaking() {
    ttsQueue = [];
    ttsPlaying = false;
    if (currentSource) {
      try { currentSource.stop(); } catch(e) {}
      currentSource = null;
    }
    isSpeaking = false;
    if (ttsSpeakDots) { removeDots(ttsSpeakDots); ttsSpeakDots = null; }
  }

  /* ══════════════════════════════════════════
     CAMERA
     ══════════════════════════════════════════ */
  window.openCamera = function() {
    document.getElementById('cameraInput').click();
  };

  function onCameraCapture(e) {
    var file = e.target.files && e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      var dataUrl = ev.target.result;
      var base64 = dataUrl.split(',')[1];
      var mimeType = file.type || 'image/jpeg';
      pendingImage = { base64: base64, mimeType: mimeType };

      // Preview zeigen
      previewImg.src = dataUrl;
      imagePreview.classList.add('visible');
      onInputChange();

      // Auto-Prompt wenn kein Text
      if (!msgInput.value.trim()) {
        msgInput.value = 'Was siehst du auf diesem Foto?';
        msgInput.dispatchEvent(new Event('input'));
      }
    };
    reader.readAsDataURL(file);
    // Input resetten fuer erneutes Foto
    e.target.value = '';
  }

  window.removeImage = function() {
    pendingImage = null;
    imagePreview.classList.remove('visible');
    previewImg.src = '';
    onInputChange();
  };

  /* ══════════════════════════════════════════
     WEB SPEECH API (Mikrofon)
     ══════════════════════════════════════════ */
  window.toggleMic = function() {
    if (isRecording) {
      stopRecording();
    } else {
      startRecording();
    }
  };

  function startRecording() {
    var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      renderSystemMsg('Spracheingabe wird von deinem Browser nicht unterstuetzt. Nutze die Tastatur.');
      return;
    }

    var speechSent = false;

    recognition = new SpeechRecognition();
    recognition.lang = 'de-DE';
    recognition.continuous = false;
    recognition.interimResults = true;

    recognition.onstart = function() {
      isRecording = true;
      speechSent = false;
      micBtn.classList.add('recording');
      showListeningDots();
    };

    recognition.onresult = function(e) {
      if (speechSent) return; // Nach dem Senden nichts mehr ins Feld schreiben
      var transcript = '';
      for (var i = 0; i < e.results.length; i++) {
        transcript += e.results[i][0].transcript;
      }
      msgInput.value = transcript;
      msgInput.dispatchEvent(new Event('input'));
    };

    recognition.onend = function() {
      isRecording = false;
      micBtn.classList.remove('recording');
      hideListeningDots();
      // Auto-senden wenn Text vorhanden
      if (!speechSent && msgInput.value.trim()) {
        speechSent = true;
        sendMessage();
      }
    };

    recognition.onerror = function(e) {
      isRecording = false;
      micBtn.classList.remove('recording');
      hideListeningDots();
      if (e.error !== 'no-speech' && e.error !== 'aborted') {
        renderSystemMsg('Mikrofon-Fehler: ' + e.error);
      }
    };

    recognition.start();
  }

  function stopRecording() {
    if (recognition) {
      recognition.stop();
    }
  }

  var listeningDotsEl = null;

  function showListeningDots() {
    if (welcomeMsg) { welcomeMsg.remove(); welcomeMsg = null; }
    listeningDotsEl = showDots('listening');
  }

  function hideListeningDots() {
    if (listeningDotsEl) { removeDots(listeningDotsEl); listeningDotsEl = null; }
  }

  /* ══════════════════════════════════════════
     RENDER
     ══════════════════════════════════════════ */
  function renderUserBubble(msg) {
    var el = document.createElement('div');
    el.className = 'msg user' + (msg.image ? ' has-image' : '');
    var html = '';
    if (msg.image) {
      html += '<img class="msg-image" src="data:' + msg.image.mimeType + ';base64,' + msg.image.base64 + '" alt="Foto">';
    }
    if (msg.text) {
      html += '<div class="msg-text">' + escapeHtml(msg.text) + '</div>';
    }
    el.innerHTML = html;
    chatArea.appendChild(el);
    scrollToBottom();
  }

  function renderAssistantBubble(text) {
    var el = document.createElement('div');
    el.className = 'msg assistant';
    el.innerHTML = renderMarkdown(text);
    chatArea.appendChild(el);
    scrollToBottom();
  }

  function renderSystemMsg(text) {
    var el = document.createElement('div');
    el.className = 'msg system';
    el.textContent = text;
    chatArea.appendChild(el);
    scrollToBottom();
  }

  function showDots(mode) {
    var container = document.createElement('div');
    container.className = 'dots-container ' + mode;
    for (var i = 0; i < 3; i++) {
      var dot = document.createElement('div');
      dot.className = 'dot';
      container.appendChild(dot);
    }
    chatArea.appendChild(container);
    scrollToBottom();
    return container;
  }

  function removeDots(el) {
    if (el && el.parentNode) el.parentNode.removeChild(el);
  }

  function scrollToBottom() {
    requestAnimationFrame(function() {
      chatArea.scrollTop = chatArea.scrollHeight;
    });
  }

  /* ══════════════════════════════════════════
     INPUT HANDLING
     ══════════════════════════════════════════ */
  function onInputChange() {
    var hasText = (msgInput.value || '').trim().length > 0;
    var hasImage = !!pendingImage;
    if (hasText || hasImage) {
      sendBtn.classList.add('active');
    } else {
      sendBtn.classList.remove('active');
    }
  }

  /* ══════════════════════════════════════════
     MARKDOWN (minimal)
     ══════════════════════════════════════════ */
  function renderMarkdown(text) {
    var html = escapeHtml(text);

    // Code-Bloecke (```)
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(m, lang, code) {
      return '<pre><code>' + code.trim() + '</code></pre>';
    });

    // Inline Code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

    // Bold
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

    // Italic
    html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');

    // Links
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

    // Line breaks
    html = html.replace(/\n\n/g, '</p><p>');
    html = html.replace(/\n/g, '<br>');
    html = '<p>' + html + '</p>';

    return html;
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /* ══════════════════════════════════════════
     BOOT
     ══════════════════════════════════════════ */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
