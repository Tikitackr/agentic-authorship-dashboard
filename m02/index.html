    for (var i = 0; i < SPRINTS.length; i++) {
      for (var j = 0; j < SPRINTS[i].tasks.length; j++) {
        ids.push(SPRINTS[i].tasks[j].id);
      }
    }
    for (var c = 0; c < CHAPTERS.length; c++) {
      for (var s = 0; s < STEPS.length; s++) {
        ids.push('kap' + CHAPTERS[c].num + '-' + s);
      }
    }
    return ids;
  }

  function getCounts() {
    var all = getAllTaskIds();
    var done = 0;
    for (var i = 0; i < all.length; i++) {
      if (isTaskDone(all[i])) done++;
    }
    return { total: all.length, done: done, open: all.length - done };
  }

  // ── Collapse State ──
  var collapsed = {};

  function toggleCollapse(sectionId) {
    collapsed[sectionId] = !collapsed[sectionId];
    render();
  }

  // ── Filter Logic ──
  function matchesFilter(taskId, sprintId) {
    if (currentFilter === 'all') return true;
    if (currentFilter === 'open') return !isTaskDone(taskId);
    if (currentFilter === 'done') return isTaskDone(taskId);
    return sprintId === currentFilter;
  }

  // ── Render ──
  function render() {
    var counts = getCounts();
    var pct = counts.total > 0 ? Math.round(counts.done / counts.total * 100) : 0;

    // Hero
    document.getElementById('m02-total-pct').textContent = pct + '%';
    document.getElementById('m02-progress').style.width = pct + '%';
    document.getElementById('m02-progress-label').textContent = counts.done + ' von ' + counts.total + ' Aufgaben erledigt';

    // Stats
    document.getElementById('m02-count-all').textContent = counts.total;
    document.getElementById('m02-count-open').textContent = counts.open;
    document.getElementById('m02-count-done').textContent = counts.done;

    // Active stat
    var statCards = document.querySelectorAll('.m02-stat');
    for (var s = 0; s < statCards.length; s++) {
      statCards[s].classList.toggle('active', statCards[s].getAttribute('data-filter') === currentFilter ||
        (currentFilter !== 'all' && currentFilter !== 'open' && currentFilter !== 'done' && statCards[s].getAttribute('data-filter') === 'sprint'));
    }

    // Active filter
    var filterBtns = document.querySelectorAll('.m02-filter-btn');
    for (var f = 0; f < filterBtns.length; f++) {
      filterBtns[f].classList.toggle('active', filterBtns[f].getAttribute('data-filter') === currentFilter);
    }

    // Sections
    var container = document.getElementById('m02-sections');
    var html = '';

    // Sprint sections
    for (var i = 0; i < SPRINTS.length; i++) {
      var sp = SPRINTS[i];

      // Filter: wenn Sprint-Filter aktiv und nicht dieser Sprint, uebergehen
      if (currentFilter.indexOf('sprint') === 0 && currentFilter !== sp.id && currentFilter !== 'all') continue;
      if (currentFilter === 'buch') continue; // Buch-Filter: Sprints ausblenden

      // Zaehle sichtbare Tasks in diesem Sprint
      var visibleTasks = [];
      var sprintDone = 0;
      for (var j = 0; j < sp.tasks.length; j++) {
        var t = sp.tasks[j];
        if (matchesFilter(t.id, sp.id)) visibleTasks.push(t);
        if (isTaskDone(t.id)) sprintDone++;
      }

      if (visibleTasks.length === 0 && (currentFilter === 'open' || currentFilter === 'done')) continue;

      var isCollapsed = collapsed[sp.id];
      var countBg = sprintDone === sp.tasks.length ? 'rgba(34,197,94,0.15)' : sp.colorBg;
      var countColor = sprintDone === sp.tasks.length ? 'var(--green)' : sp.color;

      html += '<div class="m02-section">';
      html += '<div class="m02-section-header" data-section="' + sp.id + '">';
      html += '<div class="m02-section-icon" style="background:' + sp.colorBg + ';color:' + sp.color + '">' + sp.icon + '</div>';
      html += '<span class="m02-section-title">' + sp.title + '</span>';
      html += '<span class="m02-section-count" style="background:' + countBg + ';color:' + countColor + '">' + sprintDone + '/' + sp.tasks.length + '</span>';
      html += '<span class="m02-section-chevron' + (isCollapsed ? ' collapsed' : '') + '">' + chevronSvg + '</span>';
      html += '</div>';

      html += '<div class="m02-tasks' + (isCollapsed ? ' hidden' : '') + '">';
      for (var k = 0; k < visibleTasks.length; k++) {
        var task = visibleTasks[k];
        var done = isTaskDone(task.id);
        html += '<div class="m02-task' + (done ? ' task-done' : '') + '" data-task="' + task.id + '">';
        html += '<div class="m02-checkbox">' + checkSvg + '</div>';
        html += '<div class="m02-task-info">';
        html += '<div class="m02-task-title">' + task.title + '</div>';
        html += '<div class="m02-task-desc">' + task.desc + '</div>';
        html += '</div></div>';
      }
      html += '</div></div>';
    }

    // Buch-Pipeline
    if (currentFilter === 'all' || currentFilter === 'buch' || currentFilter === 'open' || currentFilter === 'done') {
      var buchVisible = false;

      // Pruefen ob mind. 1 Kapitel sichtbar
      if (currentFilter === 'all' || currentFilter === 'buch') {
        buchVisible = true;
      } else {
        for (var ci = 0; ci < CHAPTERS.length && !buchVisible; ci++) {
          for (var si = 0; si < STEPS.length; si++) {
            var tid = 'kap' + CHAPTERS[ci].num + '-' + si;
            if (matchesFilter(tid, 'buch')) { buchVisible = true; break; }
          }
        }
      }

      if (buchVisible) {
        var buchDone = 0;
        var buchTotal = CHAPTERS.length * STEPS.length;
        for (var cx = 0; cx < CHAPTERS.length; cx++) {
          for (var sx = 0; sx < STEPS.length; sx++) {
            if (isTaskDone('kap' + CHAPTERS[cx].num + '-' + sx)) buchDone++;
          }
        }

        var buchCollapsed = collapsed['buch'];
        var buchCountBg = buchDone === buchTotal ? 'rgba(34,197,94,0.15)' : 'rgba(167,139,250,0.15)';
        var buchCountColor = buchDone === buchTotal ? 'var(--green)' : 'var(--purple)';

        html += '<div class="m02-section">';
        html += '<div class="m02-section-header" data-section="buch">';
        html += '<div class="m02-section-icon" style="background:rgba(167,139,250,0.15);color:var(--purple)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg></div>';
        html += '<span class="m02-section-title">Buch-Pipeline (15 Kapitel)</span>';
        html += '<span class="m02-section-count" style="background:' + buchCountBg + ';color:' + buchCountColor + '">' + buchDone + '/' + buchTotal + '</span>';
        html += '<span class="m02-section-chevron' + (buchCollapsed ? ' collapsed' : '') + '">' + chevronSvg + '</span>';
        html += '</div>';

        html += '<div class="m02-pipeline' + (buchCollapsed ? ' hidden' : '') + '">';
        for (var ch = 0; ch < CHAPTERS.length; ch++) {
          var chap = CHAPTERS[ch];
          var chapDone = 0;
          for (var st = 0; st < STEPS.length; st++) {
            if (isTaskDone('kap' + chap.num + '-' + st)) chapDone++;
          }
          var chapPct = Math.round(chapDone / STEPS.length * 100);
          var chapPctColor = chapPct === 100 ? 'color:var(--green)' : chapPct > 0 ? 'color:var(--amber)' : 'color:var(--text-dim)';

          html += '<div class="m02-chapter-card">';
          html += '<div class="m02-chapter-top">';
          html += '<span class="m02-chapter-id">Kap ' + chap.num + '</span>';
          html += '<span class="m02-chapter-pct" style="' + chapPctColor + '">' + chapPct + '%</span>';
          html += '</div>';
          html += '<div class="m02-chapter-title">' + chap.title + '</div>';
          html += '<div class="m02-steps">';
          for (var step = 0; step < STEPS.length; step++) {
            var stepId = 'kap' + chap.num + '-' + step;
            var stepDone = isTaskDone(stepId);
            html += '<div class="m02-step' + (stepDone ? ' step-done' : '') + '" data-task="' + stepId + '">';
            html += '<div class="m02-step-tooltip">' + STEPS[step] + (stepDone ? ' \u2713' : '') + '</div>';
            html += '</div>';
          }
          html += '</div></div>';
        }
        html += '</div></div>';
      }
    }

    container.innerHTML = html;

    // ── Event Handlers ──
    // Task clicks
    var taskEls = container.querySelectorAll('.m02-task');
    for (var te = 0; te < taskEls.length; te++) {
      taskEls[te].addEventListener('click', function() {
        toggleTask(this.getAttribute('data-task'));
      });
    }

    // Step clicks (Buch-Pipeline)
    var stepEls = container.querySelectorAll('.m02-step');
    for (var se = 0; se < stepEls.length; se++) {
      stepEls[se].addEventListener('click', function(e) {
        e.stopPropagation();
        toggleTask(this.getAttribute('data-task'));
      });
    }

    // Collapse handlers
    var headers = container.querySelectorAll('.m02-section-header');
    for (var h = 0; h < headers.length; h++) {
      headers[h].addEventListener('click', function() {
        toggleCollapse(this.getAttribute('data-section'));
      });
    }
  }

  // ── Filter Event Handlers ──
  var filterBtns = document.querySelectorAll('.m02-filter-btn');
  for (var fb = 0; fb < filterBtns.length; fb++) {
    filterBtns[fb].addEventListener('click', function() {
      currentFilter = this.getAttribute('data-filter');
      try { localStorage.setItem('tasks:filter', currentFilter); } catch(e) {}
      render();
    });
  }

  // Stat card clicks (shortcut filters)
  var statCards = document.querySelectorAll('.m02-stat');
  for (var sc = 0; sc < statCards.length; sc++) {
    statCards[sc].addEventListener('click', function() {
      var filter = this.getAttribute('data-filter');
      if (filter === 'sprint') {
        currentFilter = 'sprint1';
      } else {
        currentFilter = filter;
      }
      try { localStorage.setItem('tasks:filter', currentFilter); } catch(e) {}
      render();
    });
  }

  // Reset button
  document.getElementById('m02-reset-btn').addEventListener('click', function() {
    if (confirm('Wirklich den gesamten Fortschritt zuruecksetzen?')) {
      state = {};
      saveState();
      render();
    }
  });

  // ── Load saved filter ──
  try {
    var savedFilter = localStorage.getItem('tasks:filter');
    if (savedFilter) currentFilter = savedFilter;
  } catch(e) {}

  // ── Bookmark ──
  try { localStorage.setItem('shell:lastModule', 'm02'); } catch(e) {}

  // ── Initial Render ──
  render();

})();
</script>
